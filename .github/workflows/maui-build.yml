name: MAUI Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-android

      - name: Build (Android)
        run: dotnet build maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -f net10.0-android -c Release --no-restore
