name: MAUI Build

on:
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-android

      - name: Build (Android)
        run: dotnet build maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -f net10.0-android -c Release --no-restore

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64

      - name: Build (Windows)
        run: |
          dotnet build maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj `
            -f net10.0-windows10.0.19041.0 -c Release --no-restore `
            -p:WindowsPackageType=None -r win-x64
