name: Download Paradise Island Photos

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message for the downloaded photos'
        required: false
        default: 'chore: bundle 10 paradise island photos locally from Unsplash'

jobs:
  download-photos:
    name: Download real Unsplash paradise island photos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download 10 paradise island photos from Unsplash
        run: |
          mkdir -p blazor/CountdownToUs/wwwroot/images
          mkdir -p maui/CountdownToUs.Maui/wwwroot/images
          declare -A PHOTOS=(
            [1]="photo-1506744038136-46273834b3fb"
            [2]="photo-1507525428034-b723cf961d3e"
            [3]="photo-1465101099481-8da6ee8aa37b"
            [4]="photo-1519046904884-53103b34b206"
            [5]="photo-1499793983690-e29da59ef1c2"
            [6]="photo-1471922694854-ff1b63b20054"
            [7]="photo-1468413253725-0d5181091126"
            [8]="photo-1559494007-9f5847c49d94"
            [9]="photo-1548574505-5e239809ee19"
            [10]="photo-1566438480900-0609be27a4be"
          )
          for n in $(seq 1 10); do
            ID="${PHOTOS[$n]}"
            URL="https://images.unsplash.com/${ID}?auto=format&fit=crop&w=1920&q=80"
            echo "Downloading image $n: $URL"
            if curl -fL --max-time 60 -s "$URL" -o "blazor/CountdownToUs/wwwroot/images/${n}.jpg"; then
              cp "blazor/CountdownToUs/wwwroot/images/${n}.jpg" "maui/CountdownToUs.Maui/wwwroot/images/${n}.jpg"
              echo "  Saved images/${n}.jpg ($(du -h blazor/CountdownToUs/wwwroot/images/${n}.jpg | cut -f1))"
            else
              echo "  Warning: Failed to download image $n (HTTP error or timeout), skipping"
              rm -f "blazor/CountdownToUs/wwwroot/images/${n}.jpg"
            fi
          done
          count=$(find blazor/CountdownToUs/wwwroot/images -name '*.jpg' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "Error: No images could be downloaded"
            exit 1
          fi
          echo "Downloaded $count image(s)"
          ls -lh blazor/CountdownToUs/wwwroot/images/

      - name: Update DefaultImages in Blazor Home.razor
        run: |
          python3 << 'PYEOF'
          import re, os

          img_dir = 'blazor/CountdownToUs/wwwroot/images'
          files = {}
          for f in os.listdir(img_dir):
              if f.endswith('.jpg') or f.endswith('.png'):
                  try:
                      files[int(f.split('.')[0])] = f
                  except ValueError:
                      pass
          entries = [f'        "images/{files[i]}"' for i in sorted(files)]
          local_images = ',\n'.join(entries)

          for path in [
            'blazor/CountdownToUs/Pages/Home.razor',
            'maui/CountdownToUs.Maui/Components/Home.razor'
          ]:
            with open(path, 'r') as f:
              content = f.read()

            # Match the DefaultImages array regardless of whitespace or URL content
            pattern = r'(private static readonly string\[\] DefaultImages = new\[\]\s*\n\s*\{).*?(\n\s*\};)'
            replacement = r'\g<1>\n' + local_images + r'\g<2>'
            new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

            with open(path, 'w') as f:
              f.write(new_content)
            print(f"Updated {path} with {len(files)} local image path(s)")
          PYEOF

      - name: Commit and push real photos
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add blazor/CountdownToUs/wwwroot/images/ \
                  maui/CountdownToUs.Maui/wwwroot/images/ \
                  blazor/CountdownToUs/Pages/Home.razor \
                  maui/CountdownToUs.Maui/Components/Home.razor
          git diff --staged --quiet || \
            git commit -m "${{ github.event.inputs.commit_message }}"
          git push
