name: Blazor Build

on:
  push:
    branches: ["copilot/create-dotnet10-blazor-version"]
    paths: ["blazor/**"]
  pull_request:
    paths: ["blazor/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Build
        run: dotnet build blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: blazor-publish/wwwroot
