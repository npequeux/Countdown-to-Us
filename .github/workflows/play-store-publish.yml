name: Play Store Publish

# Trigger on version tags (e.g. v1.2.0) or manually via workflow_dispatch.
# See docs/PLAY_STORE_PUBLISHING.md for the full setup guide.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'
      track:
        description: 'Play Store track to publish to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-publish:
    name: Build AAB and Publish to Play Store
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy web files to www directory
        run: |
          mkdir -p www
          cp index.html countdown.js style.css www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode production keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/android/app/countdown-to-us.keystore
            cat > android/keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/android/app/countdown-to-us.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
            echo "Production keystore configured."
          else
            echo "Signing secrets not set – falling back to debug keystore."
            mkdir -p ~/.android
            if [ ! -f ~/.android/debug.keystore ]; then
              keytool -genkey -v -keystore ~/.android/debug.keystore \
                -storepass android -alias androiddebugkey -keypass android \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
            fi
          fi

      - name: Get version code and name
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading 'v' for versionName
          VERSION_NAME="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon -PversionCode=${{ github.run_number }}

      - name: Get Play Store track
        id: get_track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "track=${{ github.event.inputs.track }}" >> $GITHUB_OUTPUT
          else
            echo "track=internal" >> $GITHUB_OUTPUT
          fi

      - name: Check Play Store and signing credentials
        id: check_credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          has_play_creds=false
          has_keystore_creds=false
          [ -n "$SERVICE_ACCOUNT_JSON" ] && has_play_creds=true
          [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ] && has_keystore_creds=true
          if [ "$has_play_creds" = "true" ] && [ "$has_keystore_creds" = "true" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ All credentials configured – proceeding with Play Store upload."
          elif [ "$has_play_creds" = "true" ] && [ "$has_keystore_creds" = "false" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is set but production keystore secrets are missing (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD). A debug-signed AAB cannot be published to Google Play. See docs/APK_SIGNING.md for setup instructions."
            exit 1
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not configured – skipping Play Store upload. See docs/PLAY_STORE_PUBLISHING.md for setup instructions."
          fi

      - name: Upload AAB to Google Play
        if: steps.check_credentials.outputs.available == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.countdown.tous
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.get_track.outputs.track }}
          releaseName: ${{ steps.get_version.outputs.version_name }}
          status: completed

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
