name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-blazor:
    name: Build Blazor WebAssembly
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Publish
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Zip Blazor artifact
        run: |
          cd blazor-publish/wwwroot
          zip -r ../../countdown-to-us-blazor-${{ steps.get_version.outputs.version }}.zip .

      - name: Upload Blazor artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: countdown-to-us-blazor-${{ steps.get_version.outputs.version }}.zip
          retention-days: 1

  build-android:
    name: Build MAUI Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-android

      - name: Build Android APK
        run: |
          dotnet publish maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj \
            -f net10.0-android -c Release --no-restore \
            -p:AndroidPackageFormats=apk \
            -p:AndroidSigningKeyStore="" \
            -p:AndroidKeyStore=false

      - name: Rename APK
        run: |
          APK=$(find maui -name "*.apk" | head -1)
          mv "$APK" countdown-to-us-android-${{ steps.get_version.outputs.version }}.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: countdown-to-us-android-${{ steps.get_version.outputs.version }}.apk
          retention-days: 1

  build-windows:
    name: Build MAUI Windows App
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64

      - name: Publish Windows app
        run: |
          dotnet publish maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj `
            -f net10.0-windows10.0.19041.0 -c Release --no-restore `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishReadyToRun=false `
            -r win-x64 `
            -o windows-publish

      - name: Zip Windows artifact
        shell: bash
        run: |
          cd windows-publish
          zip -r ../countdown-to-us-windows-${{ steps.get_version.outputs.version }}.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: countdown-to-us-windows-${{ steps.get_version.outputs.version }}.zip
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [build-blazor, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Countdown to Us - Release ${{ steps.get_version.outputs.version }}

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-blazor-*.zip` | Blazor WebAssembly – extract and serve as a static site |
            | 🤖 Android | `countdown-to-us-android-*.apk` | .NET MAUI Android APK – sideload on Android device |
            | 🪟 Windows | `countdown-to-us-windows-*.zip` | .NET MAUI Windows app – extract and run the `.exe` |

            ### Installation

            **Web**: Extract the zip and deploy to any static web host (GitHub Pages, Netlify, etc.).

            **Android**: Enable "Unknown sources" in Settings > Security, then open the APK file.

            **Windows**: Extract the zip and run `CountdownToUs.Maui.exe`.

            ### Notes
            - Built with .NET 10 (Blazor WebAssembly + .NET MAUI)
            - Target date: October 1, 2028
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
