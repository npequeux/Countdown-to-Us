              if f.endswith('.jpg') or f.endswith('.png'):
                  try:
                      files[int(f.split('.')[0])] = f
                  except ValueError:
                      pass

          entries = [f'        "images/{files[i]}"' for i in sorted(files)]
          local_images = ',\n'.join(entries)
          path = 'blazor/CountdownToUs/Pages/Home.razor'
          with open(path, 'r') as f:
              content = f.read()
          pattern = r'(private static readonly string\[\] DefaultImages = new\[\]\s*\n\s*\{).*?(\n\s*\};)'
          replacement = r'\g<1>\n' + local_images + r'\g<2>'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open(path, 'w') as f:
              f.write(new_content)
          print(f"Patched {path} with {len(files)} image(s)")
          PYEOF

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Blazor
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Publish Blazor WebAssembly
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Restore Linux host
        run: dotnet restore linux-host/CountdownToUs.Linux/CountdownToUs.Linux.csproj -r linux-x64

      - name: Publish Linux host
        run: |
          dotnet publish linux-host/CountdownToUs.Linux/CountdownToUs.Linux.csproj \
            --no-restore -c Release \
            -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -o linux-publish

      - name: Copy Blazor files into Linux package
        run: cp -r blazor-publish/wwwroot linux-publish/

      - name: Create tar.gz
        run: |
          cd linux-publish
          tar -czf ../countdown-to-us-private-linux-${{ steps.get_version.outputs.version }}.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-linux-app
          path: countdown-to-us-private-linux-${{ steps.get_version.outputs.version }}.tar.gz
          retention-days: 1

  create-release:
    name: Create Private GitHub Release
    needs: [build-blazor, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Private Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Countdown to Us — Private Release ${{ steps.get_version.outputs.version }}

            This is a **private build** that uses personal photos as the default slideshow background.
            The photos are bundled directly into the app and are not stored in the repository.

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-private-blazor-*.zip` | Blazor WebAssembly – extract and serve as a static site |
            | 🤖 Android | `countdown-to-us-private-android-*.apk` | .NET MAUI Android APK – sideload on Android device |
            | 🪟 Windows (installer) | `countdown-to-us-private-setup-*.exe` | Windows installer – recommended for most users |
            | 🪟 Windows (portable) | `countdown-to-us-private-windows-*.zip` | .NET MAUI Windows app – extract and run the `.exe` |
            | 🐧 Linux (tar.gz) | `countdown-to-us-private-linux-*.tar.gz` | Self-contained Linux app (x64) |

            ### Installation

            **Web**: Extract the zip and deploy to any static web host (GitHub Pages, Netlify, etc.).

            **Android**: Enable "Unknown sources" in Settings > Security, then open the APK file.

            **Windows (installer)**: Run `countdown-to-us-private-setup-*.exe` and follow the wizard.

            **Windows (portable)**: Extract the zip and run `CountdownToUs.Maui.exe`.

            **Linux**: Extract the archive and run `./CountdownToUs`. The app opens in your default browser at `http://localhost:5000`.
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
