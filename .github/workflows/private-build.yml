              echo "Saved private image $i as ${i}.${ext}"
              saved=$((saved+1))
            fi
          done
          if [ "$saved" -eq 0 ]; then
            echo "No PRIVATE_IMAGE secrets set — using Us.jpg as default"
            cp Us.jpg blazor/CountdownToUs/wwwroot/images/1.jpg
          fi

      - name: Patch DefaultImages to use local private images
        run: |
          python3 << 'PYEOF'
          import re, os

          img_dir = 'blazor/CountdownToUs/wwwroot/images'
          files = {}
