name: Auto Release on Merge to Master

# Triggers automatically when a branch is merged (pushed) to master/main.
# Reads the version from the MAUI project and creates a full release. If that
# version tag already exists, the patch number is auto-incremented until a
# free tag is found, ensuring every merge always produces a release.

on:
  push:
    branches: [ main ]

jobs:
  # ── 1. Read version and decide whether a release is needed ──────────────────
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version (auto-increment patch if tag exists)
        id: version
        run: |
          BASE_VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj)
          MAJOR=$(echo "${BASE_VERSION}" | cut -d. -f1)
          MINOR=$(echo "${BASE_VERSION}" | cut -d. -f2)
          PATCH=$(echo "${BASE_VERSION}" | cut -d. -f3 | grep -oE '^[0-9]+')

          EXISTING_TAGS=$(git ls-remote --tags origin | awk '{print $2}' | sed 's|refs/tags/||')

          CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"

          while echo "${EXISTING_TAGS}" | grep -qx "${CANDIDATE}"; do
            echo "⏭  Tag ${CANDIDATE} already exists – incrementing patch version."
            PATCH=$((PATCH + 1))
            CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "version=${CANDIDATE}" >> $GITHUB_OUTPUT
          echo "version_name=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "is_new=true" >> $GITHUB_OUTPUT
          echo "🆕 Using version ${CANDIDATE} – starting release pipeline."

  # ── 2a. Build Blazor WebAssembly ─────────────────────────────────────────────
  build-blazor:
    name: Build Blazor WebAssembly
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Publish
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Zip Blazor artifact
        run: |
          cd blazor-publish/wwwroot
          zip -r ../../countdown-to-us-blazor-${{ needs.check-version.outputs.version }}.zip .

      - name: Upload Blazor artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: countdown-to-us-blazor-${{ needs.check-version.outputs.version }}.zip
          retention-days: 1

  # ── 2b. Build MAUI Android APK ───────────────────────────────────────────────
  build-android:
    name: Build MAUI Android APK
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-android

      - name: Build Android APK
        run: |
          dotnet publish maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj \
            -f net10.0-android -c Release --no-restore \
            -p:AndroidPackageFormats=apk \
            -p:AndroidSigningKeyStore="" \
            -p:AndroidKeyStore=false

      - name: Rename APK
        run: |
          APK=$(find maui -name "*.apk" | head -1)
          mv "$APK" countdown-to-us-android-${{ needs.check-version.outputs.version }}.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: countdown-to-us-android-${{ needs.check-version.outputs.version }}.apk
          retention-days: 1

  # ── 2c. Build MAUI Windows app ──────────────────────────────────────────────
  build-windows:
    name: Build MAUI Windows App
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0

      - name: Publish Windows app
        run: |
          dotnet publish maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj `
            -f net10.0-windows10.0.19041.0 -c Release --no-restore `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -o windows-publish

      - name: Zip Windows artifact
        shell: bash
        run: |
          cd windows-publish
          zip -r ../countdown-to-us-windows-${{ needs.check-version.outputs.version }}.zip .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: countdown-to-us-windows-${{ needs.check-version.outputs.version }}.zip
          retention-days: 1

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: [check-version, build-blazor, build-android, build-windows]
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check-version.outputs.version }}
          git push origin ${{ needs.check-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          body: |
            ## Countdown to Us – Release ${{ needs.check-version.outputs.version }}

            Automatically released from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) on `${{ github.ref_name }}`.

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-blazor-*.zip` | Blazor WebAssembly – extract and serve as a static site |
            | 🤖 Android | `countdown-to-us-android-*.apk` | .NET MAUI Android APK – sideload on Android device |
            | 🪟 Windows | `countdown-to-us-windows-*.zip` | .NET MAUI Windows app – extract and run the `.exe` |

            ### Installation

            **Web**: Extract the zip and deploy to any static web host (GitHub Pages, Netlify, etc.).

            **Android**: Enable *Install unknown apps* in Settings, then open the APK file.

            **Windows**: Extract the zip and run `CountdownToUs.Maui.exe`.

            ### Notes
            - Built with .NET 10 (Blazor WebAssembly + .NET MAUI)
            - Target date: October 1, 2028
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
