name: Auto Release on Merge to Master

# Triggers automatically when a branch is merged (pushed) to master/main.
# Reads the version from package.json and creates a full release. If that
# version tag already exists, the patch number is auto-incremented until a
# free tag is found, ensuring every merge always produces a release.
#
# Required secrets (optional – falls back gracefully when absent):
#   KEYSTORE_BASE64                  – Base64-encoded production keystore
#   KEYSTORE_PASSWORD                – Keystore password
#   KEY_ALIAS                        – Key alias
#   KEY_PASSWORD                     – Key password
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON – Google Play service account JSON
#
# See docs/APK_SIGNING.md and docs/PLAY_STORE_PUBLISHING.md for setup.

on:
  push:
    branches: [ master, main ]

jobs:
  # ── 1. Read version and decide whether a release is needed ──────────────────
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version (auto-increment patch if tag exists)
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo "${BASE_VERSION}" | cut -d. -f1)
          MINOR=$(echo "${BASE_VERSION}" | cut -d. -f2)
          # Strip any pre-release or build metadata suffix (e.g. "3-beta.1" → "3")
          PATCH=$(echo "${BASE_VERSION}" | cut -d. -f3 | grep -oE '^[0-9]+')

          # Fetch all existing remote tags once to avoid repeated network calls
          EXISTING_TAGS=$(git ls-remote --tags origin | awk '{print $2}' | sed 's|refs/tags/||')

          CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"

          while echo "${EXISTING_TAGS}" | grep -qx "${CANDIDATE}"; do
            echo "⏭  Tag ${CANDIDATE} already exists – incrementing patch version."
            PATCH=$((PATCH + 1))
            CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "version=${CANDIDATE}" >> $GITHUB_OUTPUT
          echo "version_name=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "is_new=true" >> $GITHUB_OUTPUT
          echo "🆕 Using version ${CANDIDATE} – starting release pipeline."

  # ── 2a. Build Android APK (release, signed) ─────────────────────────────────
  build-android-apk:
    name: Build Android APK
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy web files to www directory
        run: |
          mkdir -p www
          cp index.html countdown.js style.css www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Configure signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/android/app/countdown-to-us.keystore
            cat > android/keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/android/app/countdown-to-us.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
            echo "✅ Production keystore configured."
          else
            echo "ℹ️  Signing secrets not set – falling back to debug keystore."
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -PversionCode=${{ github.run_number }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
            countdown-to-us-android-${VERSION}.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: countdown-to-us-android-${{ needs.check-version.outputs.version }}.apk
          retention-days: 1

  # ── 2b. Build Android AAB (for Google Play Store) ───────────────────────────
  build-android-aab:
    name: Build Android AAB
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy web files to www directory
        run: |
          mkdir -p www
          cp index.html countdown.js style.css www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Configure signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/android/app/countdown-to-us.keystore
            cat > android/keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/android/app/countdown-to-us.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
            echo "✅ Production keystore configured."
          else
            echo "ℹ️  Signing secrets not set – falling back to debug keystore."
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon -PversionCode=${{ github.run_number }}

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 1

  # ── 2c. Build Linux packages ─────────────────────────────────────────────────
  build-linux:
    name: Build Linux (AppImage & deb)
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run build:linux

      - name: Rename Linux artifacts
        run: |
          for f in dist/*.AppImage; do
            [ -f "$f" ] && mv "$f" "countdown-to-us-linux-${VERSION}.AppImage"
          done
          for f in dist/*.deb; do
            [ -f "$f" ] && mv "$f" "countdown-to-us-linux-${VERSION}.deb"
          done

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: countdown-to-us-linux-${{ needs.check-version.outputs.version }}.AppImage
          retention-days: 1

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: countdown-to-us-linux-${{ needs.check-version.outputs.version }}.deb
          retention-days: 1

  # ── 2d. Build Windows packages ───────────────────────────────────────────────
  build-windows:
    name: Build Windows (Installer & Portable)
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows packages
        run: npm run build:win

      - name: Rename Windows artifacts
        shell: bash
        run: |
          for f in dist/*Setup*.exe; do
            [ -f "$f" ] && mv "$f" "countdown-to-us-windows-setup-${VERSION}.exe"
          done
          for f in dist/*.exe; do
            [[ "$f" != *Setup* ]] && [ -f "$f" ] && mv "$f" "countdown-to-us-windows-portable-${VERSION}.exe"
          done

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: countdown-to-us-windows-setup-${{ needs.check-version.outputs.version }}.exe
          retention-days: 1

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: countdown-to-us-windows-portable-${{ needs.check-version.outputs.version }}.exe
          retention-days: 1

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: [check-version, build-android-apk, build-android-aab, build-linux, build-windows]
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check-version.outputs.version }}
          git push origin ${{ needs.check-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          body: |
            ## Countdown to Us – Release ${{ needs.check-version.outputs.version }}

            Automatically released from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) on `${{ github.ref_name }}`.

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🤖 Android | `countdown-to-us-android-*.apk` | Sideload on Android device |
            | 🤖 Android | `app-release.aab` | Android App Bundle (Google Play / manual upload) |
            | 🐧 Linux | `countdown-to-us-linux-*.AppImage` | Portable – runs on any Linux distro |
            | 🐧 Linux | `countdown-to-us-linux-*.deb` | Debian/Ubuntu installer |
            | 🪟 Windows | `countdown-to-us-windows-setup-*.exe` | Windows installer (recommended) |
            | 🪟 Windows | `countdown-to-us-windows-portable-*.exe` | Windows portable (no installation needed) |

            ### Installation

            **Android**: Enable *Install unknown apps* in Settings, then open the APK file.

            **Linux (AppImage)**: Make executable with `chmod +x *.AppImage`, then run it.

            **Linux (deb)**: Install with `sudo dpkg -i *.deb` or double-click in your file manager.

            **Windows**: Run the setup installer or use the portable executable directly.

            ### Notes
            - Android APK is signed with the production keystore when the `KEYSTORE_*` secrets are configured, otherwise signed with a debug keystore.
            - The Android App Bundle (AAB) is published separately to the Google Play Store internal track.
            - Windows and Linux builds are packaged with Electron.
            - Target date: October 1, 2028
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Publish AAB to Google Play Store ─────────────────────────────────────
  publish-play-store:
    name: Publish to Google Play Store
    needs: [check-version, build-android-aab, create-github-release]
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download Android AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: .

      - name: Check Play Store credentials
        id: check_credentials
        run: |
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret not configured – skipping Play Store upload."
            echo "See docs/PLAY_STORE_PUBLISHING.md for setup instructions."
          fi
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Upload AAB to Google Play (internal track)
        if: steps.check_credentials.outputs.available == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.countdown.tous
          releaseFiles: app-release.aab
          track: internal
          releaseName: ${{ needs.check-version.outputs.version_name }}
          status: completed

      - name: Add job summary
        run: |
          echo "## 🚀 Release ${{ needs.check-version.outputs.version }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ needs.check-version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitHub Release** | [Release ${{ needs.check-version.outputs.version }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.check-version.outputs.version }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_credentials.outputs.available }}" = "true" ]; then
            echo "✅ **Play Store**: Published to the **internal** track." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Play Store**: Skipped – \`GOOGLE_PLAY_SERVICE_ACCOUNT_JSON\` secret not configured." >> $GITHUB_STEP_SUMMARY
          fi
