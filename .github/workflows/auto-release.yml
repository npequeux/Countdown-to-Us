name: Auto Release on Merge to Master

# Triggers automatically when a branch is merged (pushed) to master/main.
# Reads the version from the MAUI project and creates a full release. If that
# version tag already exists, the patch number is auto-incremented until a
# free tag is found, ensuring every merge always produces a release.

on:
  push:
    branches: [ main ]

jobs:
  # ── 1. Read version and decide whether a release is needed ──────────────────
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version (auto-increment patch if tag exists)
        id: version
        run: |
          BASE_VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj)
          MAJOR=$(echo "${BASE_VERSION}" | cut -d. -f1)
          MINOR=$(echo "${BASE_VERSION}" | cut -d. -f2)
          PATCH=$(echo "${BASE_VERSION}" | cut -d. -f3 | grep -oE '^[0-9]+')

          EXISTING_TAGS=$(git ls-remote --tags origin | awk '{print $2}' | sed 's|refs/tags/||')

          CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"

          while echo "${EXISTING_TAGS}" | grep -qx "${CANDIDATE}"; do
            echo "⏭  Tag ${CANDIDATE} already exists – incrementing patch version."
            PATCH=$((PATCH + 1))
            CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "version=${CANDIDATE}" >> $GITHUB_OUTPUT
          echo "version_name=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "is_new=true" >> $GITHUB_OUTPUT
          echo "🆕 Using version ${CANDIDATE} – starting release pipeline."

  # ── 2a. Build Blazor WebAssembly ─────────────────────────────────────────────
  build-blazor:
    name: Build Blazor WebAssembly
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Publish
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Zip Blazor artifact
        run: |
          cd blazor-publish/wwwroot
          zip -r ../../countdown-to-us-blazor-${{ needs.check-version.outputs.version }}.zip .

      - name: Upload Blazor artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: countdown-to-us-blazor-${{ needs.check-version.outputs.version }}.zip
          retention-days: 1

  # ── 2b. Build MAUI Android APK ───────────────────────────────────────────────
  build-android:
    name: Build MAUI Android APK
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-android

      - name: Set up Android signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode \
              > "${{ github.workspace }}/release-key.jks"
            echo "KEYSTORE_PASS=$SIGNING_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$SIGNING_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "KEY_PASS=$SIGNING_KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            KEYSTORE_PASS=$(openssl rand -hex 16)
            echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=release" >> "$GITHUB_ENV"
            echo "KEY_PASS=$KEYSTORE_PASS" >> "$GITHUB_ENV"
            keytool -genkeypair -v \
              -keystore "${{ github.workspace }}/release-key.jks" \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Countdown to Us, O=CountdownToUs, C=US" \
              -storepass "$KEYSTORE_PASS" \
              -keypass "$KEYSTORE_PASS"
          fi

      - name: Build Android APK
        run: |
          dotnet publish maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj \
            -f net10.0-android -c Release --no-restore \
            -p:AndroidPackageFormats=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="${{ github.workspace }}/release-key.jks" \
            -p:AndroidSigningKeyAlias="${{ env.KEY_ALIAS }}" \
            -p:AndroidSigningKeyPass="${{ env.KEY_PASS }}" \
            -p:AndroidSigningStorePass="${{ env.KEYSTORE_PASS }}"

      - name: Rename APK
        run: |
          APK=$(find maui -name "*-Signed.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No signed APK found. Available APKs:"
            find maui -name "*.apk"
            exit 1
          fi
          mv "$APK" countdown-to-us-android-${{ needs.check-version.outputs.version }}.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: countdown-to-us-android-${{ needs.check-version.outputs.version }}.apk
          retention-days: 1

  # ── 2c. Build MAUI Windows app ──────────────────────────────────────────────
  build-windows:
    name: Build MAUI Windows App
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj -p:TargetFrameworks=net10.0-windows10.0.19041.0 -r win-x64

      - name: Publish Windows app
        run: |
          dotnet publish maui/CountdownToUs.Maui/CountdownToUs.Maui.csproj `
            -f net10.0-windows10.0.19041.0 -c Release --no-restore `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishReadyToRun=false `
            -r win-x64 `
            -o windows-publish

      - name: Zip Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path windows-publish\* -DestinationPath countdown-to-us-windows-${{ needs.check-version.outputs.version }}.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=${{ needs.check-version.outputs.version }} ^
            /DSourceDir=%CD%\windows-publish ^
            /DOutputDir=%CD%\installer-output ^
            build\installer.iss

      - name: Rename installer
        shell: bash
        run: |
          mv installer-output/countdown-to-us-setup-${{ needs.check-version.outputs.version }}.exe \
             countdown-to-us-setup-${{ needs.check-version.outputs.version }}.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: |
            countdown-to-us-windows-${{ needs.check-version.outputs.version }}.zip
            countdown-to-us-setup-${{ needs.check-version.outputs.version }}.exe
          retention-days: 1

  # ── 2d. Build Linux package ──────────────────────────────────────────────────
  build-linux:
    name: Build Linux Package
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Blazor
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Publish Blazor WebAssembly
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Restore Linux host
        run: dotnet restore linux-host/CountdownToUs.Linux/CountdownToUs.Linux.csproj -r linux-x64

      - name: Publish Linux host
        run: |
          dotnet publish linux-host/CountdownToUs.Linux/CountdownToUs.Linux.csproj \
            --no-restore -c Release \
            -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -o linux-publish

      - name: Copy Blazor files into Linux package
        run: cp -r blazor-publish/wwwroot linux-publish/

      - name: Create tar.gz
        run: |
          cd linux-publish
          tar -czf ../countdown-to-us-linux-${{ needs.check-version.outputs.version }}.tar.gz .

      - name: Create .deb package
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          DEB_VERSION="${VERSION#v}"
          DEB_DIR="deb-pkg"

          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/lib/countdown-to-us"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/icons/hicolor/256x256/apps"

          cp -r linux-publish/* "$DEB_DIR/usr/lib/countdown-to-us/"

          cat > "$DEB_DIR/usr/bin/countdown-to-us" << 'EOF'
          #!/bin/bash
          exec /usr/lib/countdown-to-us/CountdownToUs "$@"
          EOF
          chmod +x "$DEB_DIR/usr/bin/countdown-to-us"

          cat > "$DEB_DIR/usr/share/applications/countdown-to-us.desktop" << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Countdown to Us
          Comment=Beautiful countdown timer to October 1, 2028
          Exec=countdown-to-us
          Icon=countdown-to-us
          Terminal=false
          Categories=Utility;
          EOF

          cp build/icon.png "$DEB_DIR/usr/share/icons/hicolor/256x256/apps/countdown-to-us.png"

          cat > "$DEB_DIR/DEBIAN/control" << EOF
          Package: countdown-to-us
          Version: $DEB_VERSION
          Architecture: amd64
          Maintainer: Countdown to Us <https://github.com/npequeux/Countdown-to-Us>
          Description: Beautiful countdown timer
           A countdown timer displaying the time remaining until October 1, 2028.
           Built with .NET 10 (Blazor WebAssembly + ASP.NET Core).
          EOF

          dpkg-deb --build "$DEB_DIR" countdown-to-us-linux-${{ needs.check-version.outputs.version }}.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: |
            countdown-to-us-linux-${{ needs.check-version.outputs.version }}.tar.gz
            countdown-to-us-linux-${{ needs.check-version.outputs.version }}.deb
          retention-days: 1

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: [check-version, build-blazor, build-android, build-windows, build-linux]
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Determine final release version
        id: final_version
        run: |
          git fetch --tags

          ORIGINAL="${{ needs.check-version.outputs.version }}"
          VERSION="${ORIGINAL#v}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)
          PATCH=$(echo "${VERSION}" | cut -d. -f3)

          CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          while git rev-parse "${CANDIDATE}" >/dev/null 2>&1; do
            echo "⏭  Tag ${CANDIDATE} already exists – incrementing patch version."
            PATCH=$((PATCH + 1))
            CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "version=${CANDIDATE}" >> $GITHUB_OUTPUT

          if [ "${CANDIDATE}" != "${ORIGINAL}" ]; then
            echo "⚠️  Version bumped from ${ORIGINAL} to ${CANDIDATE} due to concurrent release."
            while IFS= read -r -d '' f; do
              dir=$(dirname "$f")
              base=$(basename "$f")
              newbase="${base//${ORIGINAL}/${CANDIDATE}}"
              mv "$f" "${dir}/${newbase}"
              echo "Renamed: $f -> ${dir}/${newbase}"
            done < <(find release-assets -name "*${ORIGINAL}*" -print0)
          fi

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.final_version.outputs.version }}
          git push origin ${{ steps.final_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.final_version.outputs.version }}
          name: Release ${{ steps.final_version.outputs.version }}
          body: |
            ## Countdown to Us – Release ${{ steps.final_version.outputs.version }}

            Automatically released from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) on `${{ github.ref_name }}`.

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-blazor-*.zip` | Blazor WebAssembly – extract and serve as a static site |
            | 🤖 Android | `countdown-to-us-android-*.apk` | .NET MAUI Android APK – sideload on Android device |
            | 🪟 Windows (installer) | `countdown-to-us-setup-*.exe` | Windows installer – recommended for most users |
            | 🪟 Windows (portable) | `countdown-to-us-windows-*.zip` | .NET MAUI Windows app – extract and run the `.exe` |
            | 🐧 Linux (tar.gz) | `countdown-to-us-linux-*.tar.gz` | Self-contained Linux app (x64) |
            | 🐧 Linux (.deb) | `countdown-to-us-linux-*.deb` | Debian/Ubuntu package (x64) |

            ### Installation

            **Web**: Extract the zip and deploy to any static web host (GitHub Pages, Netlify, etc.).

            **Android**: Enable *Install unknown apps* in Settings, then open the APK file.

            **Windows (installer)**: Run `countdown-to-us-setup-*.exe` and follow the wizard.

            **Windows (portable)**: Extract the zip and run `CountdownToUs.Maui.exe`.

            **Linux (tar.gz)**: Extract the archive and run `./CountdownToUs`. The app opens in your default browser at `http://localhost:5000`.

            **Linux (.deb)**: Install with `sudo dpkg -i countdown-to-us-linux-*.deb`, then launch from your application menu or run `countdown-to-us`.

            ### Notes
            - Built with .NET 10 (Blazor WebAssembly + .NET MAUI + ASP.NET Core)
            - Target date: October 1, 2028
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
