        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=${{ needs.check-version.outputs.version }} ^
            /DSourceDir=%CD%\windows-publish ^
            /DOutputDir=%CD%\installer-output ^
            build\installer.iss

      - name: Rename installer
        shell: bash
        run: |
          mv installer-output/countdown-to-us-setup-${{ needs.check-version.outputs.version }}.exe \
             countdown-to-us-wallpapers-setup-${{ needs.check-version.outputs.version }}.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallpapers-windows-app
          path: |
            countdown-to-us-wallpapers-windows-${{ needs.check-version.outputs.version }}.zip
            countdown-to-us-wallpapers-setup-${{ needs.check-version.outputs.version }}.exe
          retention-days: 1

  # -- 4d. Build Wallpapers Linux Package ---------------------------------------
  build-wallpapers-linux:
    name: Build Wallpapers Linux Package
    needs: check-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download paradise island wallpapers
        run: |
          mkdir -p blazor/CountdownToUs/wwwroot/images
          declare -A PHOTOS=(
            [1]="photo-1506744038136-46273834b3fb"
            [2]="photo-1507525428034-b723cf961d3e"
            [3]="photo-1465101099481-8da6ee8aa37b"
            [4]="photo-1519046904884-53103b34b206"
            [5]="photo-1499793983690-e29da59ef1c2"
            [6]="photo-1471922694854-ff1b63b20054"
            [7]="photo-1468413253725-0d5181091126"
            [8]="photo-1559494007-9f5847c49d94"
            [9]="photo-1548574505-5e239809ee19"
            [10]="photo-1566438480900-0609be27a4be"
          )
          for n in $(seq 1 10); do
            ID="${PHOTOS[$n]}"
            URL="https://images.unsplash.com/${ID}?auto=format&fit=crop&w=1920&q=80"
            echo "Downloading wallpaper $n: $URL"
            if curl -fL --max-time 60 -s "$URL" -o "blazor/CountdownToUs/wwwroot/images/${n}.jpg"; then
              echo "  Saved images/${n}.jpg ($(du -h blazor/CountdownToUs/wwwroot/images/${n}.jpg | cut -f1))"
            else
              echo "  Warning: Failed to download image $n (HTTP error or timeout), skipping"
              rm -f "blazor/CountdownToUs/wwwroot/images/${n}.jpg"
            fi
          done
          count=$(find blazor/CountdownToUs/wwwroot/images -name '*.jpg' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "Error: No wallpaper images could be downloaded"
            exit 1
          fi
          echo "Downloaded $count wallpaper image(s)"

      - name: Patch DefaultImages to use local wallpaper images
        run: |
          python3 - << 'PYEOF'
          import re, os

          img_dir = 'blazor/CountdownToUs/wwwroot/images'
          files = {}
          for f in os.listdir(img_dir):
              if f.endswith('.jpg') or f.endswith('.png'):
                  try:
                      files[int(f.split('.')[0])] = f
                  except ValueError:
                      pass
          entries = [f'        "images/{files[i]}"' for i in sorted(files)]
          local_images = ',\n'.join(entries)
          path = 'blazor/CountdownToUs/Pages/Home.razor'
          with open(path, 'r') as f:
              content = f.read()
          pattern = r'(private static readonly string\[\] DefaultImages = new\[\]\s*\n\s*\{).*?(\n\s*\};)'
          replacement = r'\g<1>\n' + local_images + r'\g<2>'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open(path, 'w') as f:
              f.write(new_content)
          print(f"Patched {path} with {len(files)} wallpaper image(s)")
          PYEOF

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Blazor
        run: dotnet restore blazor/CountdownToUs/CountdownToUs.csproj

      - name: Publish Blazor WebAssembly
        run: dotnet publish blazor/CountdownToUs/CountdownToUs.csproj --no-restore -c Release -o blazor-publish

      - name: Restore Linux host
        run: dotnet restore linux-host/CountdownToUs.Linux/CountdownToUs.Linux.csproj -r linux-x64

      - name: Publish Linux host
        run: |
          dotnet publish linux-host/CountdownToUs.Linux/CountdownToUs.Linux.csproj \
            --no-restore -c Release \
            -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -o linux-publish

      - name: Copy Blazor files into Linux package
        run: cp -r blazor-publish/wwwroot linux-publish/

      - name: Create tar.gz
        run: |
          cd linux-publish
          tar -czf ../countdown-to-us-wallpapers-linux-${{ needs.check-version.outputs.version }}.tar.gz .

      - name: Create .deb package
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          DEB_VERSION="${VERSION#v}"
          DEB_DIR="deb-pkg"

          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/lib/countdown-to-us"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/icons/hicolor/256x256/apps"

          cp -r linux-publish/* "$DEB_DIR/usr/lib/countdown-to-us/"

          cat > "$DEB_DIR/usr/bin/countdown-to-us" << 'EOF'
          #!/bin/bash
          exec /usr/lib/countdown-to-us/CountdownToUs "$@"
          EOF
          chmod +x "$DEB_DIR/usr/bin/countdown-to-us"

          cat > "$DEB_DIR/usr/share/applications/countdown-to-us.desktop" << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Countdown to Us
          Comment=Beautiful countdown timer to October 1, 2028
          Exec=countdown-to-us
          Icon=countdown-to-us
          Terminal=false
          Categories=Utility;
          EOF

          cp build/icon.png "$DEB_DIR/usr/share/icons/hicolor/256x256/apps/countdown-to-us.png"

          cat > "$DEB_DIR/DEBIAN/control" << EOF
          Package: countdown-to-us
          Version: $DEB_VERSION
          Architecture: amd64
          Maintainer: Countdown to Us <https://github.com/npequeux/Countdown-to-Us>
          Description: Beautiful countdown timer (wallpapers build)
           A countdown timer displaying the time remaining until October 1, 2028.
           Built with .NET 10 (Blazor WebAssembly + ASP.NET Core).
           Includes paradise island wallpaper photos.
          EOF

          dpkg-deb --build "$DEB_DIR" countdown-to-us-wallpapers-linux-${{ needs.check-version.outputs.version }}.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallpapers-linux-app
          path: |
            countdown-to-us-wallpapers-linux-${{ needs.check-version.outputs.version }}.tar.gz
            countdown-to-us-wallpapers-linux-${{ needs.check-version.outputs.version }}.deb
          retention-days: 1

  # -- 5. Create unified GitHub Release (all variants) --------------------------
  create-github-release:
    name: Create GitHub Release
    needs:
      - check-version
      - build-blazor
      - build-android
      - build-windows
      - build-linux
      - build-private-blazor
      - build-private-android
      - build-private-windows
      - build-private-linux
      - build-wallpapers-blazor
      - build-wallpapers-android
      - build-wallpapers-windows
      - build-wallpapers-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Determine final release version
        id: final_version
        run: |
          git fetch --tags

          ORIGINAL="${{ needs.check-version.outputs.version }}"
          VERSION="${ORIGINAL#v}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)
          PATCH=$(echo "${VERSION}" | cut -d. -f3)

          CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          # Also check legacy private-v* and wallpapers-v* tags to avoid
          # version_code collisions with APKs installed from older releases.
          while git rev-parse "${CANDIDATE}" >/dev/null 2>&1 || \
                git rev-parse "private-v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1 || \
                git rev-parse "wallpapers-v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1; do
            echo "Tag ${CANDIDATE} (or a sibling tag) already exists – incrementing patch version."
            PATCH=$((PATCH + 1))
            CANDIDATE="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "version=${CANDIDATE}" >> $GITHUB_OUTPUT

          if [ "${CANDIDATE}" != "${ORIGINAL}" ]; then
            echo "Version bumped from ${ORIGINAL} to ${CANDIDATE} due to concurrent release."
            while IFS= read -r -d '' f; do
              dir=$(dirname "$f")
              base=$(basename "$f")
              newbase="${base//${ORIGINAL}/${CANDIDATE}}"
              mv "$f" "${dir}/${newbase}"
              echo "Renamed: $f -> ${dir}/${newbase}"
            done < <(find release-assets -name "*${ORIGINAL}*" -print0)
          fi

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.final_version.outputs.version }}
          git push origin ${{ steps.final_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.final_version.outputs.version }}
          name: Release ${{ steps.final_version.outputs.version }}
          body: |
            ## Countdown to Us – Release ${{ steps.final_version.outputs.version }}

            Automatically released from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) on `${{ github.ref_name }}`.

            ### Downloads

            #### Standard edition
            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-blazor-*.zip` | Blazor WebAssembly – extract and serve as a static site |
            | 🤖 Android | `countdown-to-us-android-*.apk` | .NET MAUI Android APK – sideload on Android device |
            | 🪟 Windows (installer) | `countdown-to-us-setup-*.exe` | Windows installer – recommended for most users |
            | 🪟 Windows (portable) | `countdown-to-us-windows-*.zip` | .NET MAUI Windows app – extract and run the `.exe` |
            | 🐧 Linux (tar.gz) | `countdown-to-us-linux-*.tar.gz` | Self-contained Linux app (x64) |
            | 🐧 Linux (.deb) | `countdown-to-us-linux-*.deb` | Debian/Ubuntu package (x64) |

            #### Private edition (personal photos from secrets)
            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-private-blazor-*.zip` | Blazor WebAssembly with personal photos |
            | 🤖 Android | `countdown-to-us-private-android-*.apk` | Android APK with personal photos |
            | 🪟 Windows (installer) | `countdown-to-us-private-setup-*.exe` | Windows installer with personal photos |
            | 🪟 Windows (portable) | `countdown-to-us-private-windows-*.zip` | Windows app with personal photos |
            | 🐧 Linux (tar.gz) | `countdown-to-us-private-linux-*.tar.gz` | Linux app with personal photos |
            | 🐧 Linux (.deb) | `countdown-to-us-private-linux-*.deb` | Debian/Ubuntu package with personal photos |

            #### Wallpapers edition (paradise island photos)
            | Platform | File | Notes |
            |---|---|---|
            | 🌐 Web | `countdown-to-us-wallpapers-blazor-*.zip` | Blazor WebAssembly with paradise wallpapers |
            | 🤖 Android | `countdown-to-us-wallpapers-android-*.apk` | Android APK with paradise wallpapers |
            | 🪟 Windows (installer) | `countdown-to-us-wallpapers-setup-*.exe` | Windows installer with paradise wallpapers |
            | 🪟 Windows (portable) | `countdown-to-us-wallpapers-windows-*.zip` | Windows app with paradise wallpapers |
            | 🐧 Linux (tar.gz) | `countdown-to-us-wallpapers-linux-*.tar.gz` | Linux app with paradise wallpapers |
            | 🐧 Linux (.deb) | `countdown-to-us-wallpapers-linux-*.deb` | Debian/Ubuntu package with paradise wallpapers |

            ### Installation

            **Web**: Extract the zip and deploy to any static web host (GitHub Pages, Netlify, etc.).

            **Android**: Enable *Install unknown apps* in Settings, then open the APK file.

            **Windows (installer)**: Run the `.exe` installer and follow the wizard.

            **Windows (portable)**: Extract the zip and run `CountdownToUs.Maui.exe`.

            **Linux (tar.gz)**: Extract the archive and run `./CountdownToUs`. The app opens in your default browser at `http://localhost:5000`.

            **Linux (.deb)**: Install with `sudo dpkg -i countdown-to-us-linux-*.deb`, then launch from your application menu or run `countdown-to-us`.

            ### Notes
            - Built with .NET 10 (Blazor WebAssembly + .NET MAUI + ASP.NET Core)
            - Target date: October 1, 2028
            - Wallpaper photos sourced from [Unsplash](https://unsplash.com)
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
