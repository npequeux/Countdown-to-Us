<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Countdown to Us</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <style>
        /* Prevent default MAUI blue loading bar */
        #blazor-error-ui { display: none; }
    </style>
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>
        window.setBodyBackground = function (url) {
            var escaped = url.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            document.body.style.backgroundImage = 'url("' + escaped + '")';
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundRepeat = 'no-repeat';
            document.body.style.backgroundAttachment = 'scroll';
        };
        window.setHtmlLang = function (lang) {
            document.documentElement.setAttribute('lang', lang);
        };
    </script>
</body>

</html>
